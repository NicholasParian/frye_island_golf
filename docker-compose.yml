# `db` and `api` are only on `frye_island_golf` (isolated from other subprojects' stacks and from `xraes_proxy`).
# `web` joins that network to reach the API, and joins `xraes_proxy` so the edge (Caddy) can reach the UI only.
services:
  db:
    image: postgres:16-alpine
    networks:
      - frye_island_golf
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: frye_island_golf
    volumes:
      - pgdata:/var/lib/postgresql/data
    # In production, remove the next two lines so Postgres is not exposed on the host;
    # use `docker compose exec db psql` or a private network only.
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d frye_island_golf"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    networks:
      - frye_island_golf
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/frye_island_golf?schema=public
      PORT: "4000"
      NODE_ENV: production
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:8080}
      PUBLIC_PATH_PREFIX: ${PUBLIC_PATH_PREFIX:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_PUBLIC_PATH_PREFIX: ${PUBLIC_PATH_PREFIX:-}
        PUBLIC_PATH_PREFIX: ${PUBLIC_PATH_PREFIX:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      frye_island_golf: {}
      xraes_proxy:
        aliases:
          - frye-web

networks:
  frye_island_golf:
    name: frye_island_golf
    driver: bridge
  xraes_proxy:
    name: xraes_proxy
    external: true

volumes:
  pgdata:
