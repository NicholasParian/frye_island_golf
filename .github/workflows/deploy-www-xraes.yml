# Deploy stack to your server when you choose "Run workflow".
# Required GitHub repo secrets:
#   DEPLOY_HOST     — e.g. 203.0.113.50 or ssh.xraes.com
#   DEPLOY_USER     — SSH user (e.g. deploy)
#   DEPLOY_SSH_KEY  — private key (full PEM, paste with newlines)
#   DEPLOY_PATH     — absolute path to this repo on the server (e.g. /home/deploy/fryeIslandGolf)
#
# On the server: install Docker + Compose, clone repo, create .env (see .env.example), then
# either run this workflow or manually: docker compose up -d --build
#
# DNS: point www.xraes.com (and optionally xraes.com) A/AAAA records to this host; terminate TLS
# with Caddy, nginx, or a Cloudflare proxy in front of WEB_PORT (default 8080) or bind 80/443.

name: Deploy www.xraes.com

on:
  workflow_dispatch:

concurrency:
  group: deploy-xraes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin "${{ github.ref_name }}"
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            docker compose up -d --build
            docker compose ps
